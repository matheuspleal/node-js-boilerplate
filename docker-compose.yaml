services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: app
    ports:
      - ${API_PORT:-3333}:3333
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SCHEMA=${DB_SCHEMA}
    volumes:
      - ./src:/usr/src/app/src
      - ./prisma:/usr/src/app/prisma
      - ./package.json:/usr/src/app/package.json
      - ./pnpm-lock.yaml:/usr/src/app/pnpm-lock.yaml
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - /usr/src/app/node_modules
      - app_data:/usr/src/app/data
    networks:
      - net
    restart: always

  database:
    image: bitnami/postgresql
    container_name: database
    ports:
      - ${DB_PORT:-5432}:5432
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/postgresql
    networks:
      - net
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  net:
    driver: bridge

volumes:
  app_data:
  db_data:
